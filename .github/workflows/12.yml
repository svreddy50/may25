name: Functions-1
on: workflow_dispatch
jobs:
  job1:
    runs-on: ubuntu-latest 
    steps:
    - name: step0
      if: ${{ contains('sheshi','sh')}}
      run: |
         echo "hello Sheshi"
    - name: This is Step1
      run: |
          echo " This is Step1"
          sleep 10
    - name: This is Step2   
      run: |
         echo " This is Step2"   
         sleep 10
    - name: This is Step3
      if : ${{ failure() }}    
      run: |
         echo " This is Step3 In case Of Failure"   
    - name: This is Step4
      if : ${{ always() }}    
      run: |
         echo " This is Step4 always"   
         sleep 5
    - name: This is Step5
      if : ${{ cancelled() }}    
      run: |
         echo " This is Step5 Cancelled"   
         sleep 15
    - name: This is Step6
      if : ${{ !cancelled() }}    
      run: |
         echo " This is step6 Not Cancelled"   
         sleep 15     
              
            
