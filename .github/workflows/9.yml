name: Github Context Vars
on:
  workflow_dispatch:
jobs:
  job1:
    runs-on: ubuntu-latest
    steps:  
    - name: Print msgs
      run: |
        echo "Event name is ${{ github.event_name }}"
        echo "Username is ${{ github.actor }}"     
        echo "Branch name is ${{ github.ref }}" 
        echo "Commit Id ${{ github.sha }}"    
        echo "Repository ${{ github.repository }}"        